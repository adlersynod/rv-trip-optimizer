[railway]
version = 2

[build]
builder = "NIXPACKS"

[nixpacks]
pythonVersion = "3.11"

[deploy]
startCommand = "bash startup.sh"
environment = ["STREAMLIT_SERVER_PORT=8080"]

# ─── Startup script (created alongside railway.toml) ──────────────
# Runs both Flask API (port 3000) and Streamlit (port 8080) in background
