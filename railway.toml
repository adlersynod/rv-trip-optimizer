[railway]
version = 2

[build]
builder = "NIXPACKS"

[nixpacks]
pythonVersion = "3.11"

[deploy]
# Railway injects $PORT env var; Streamlit needs --server.port pointing to it
startCommand = "streamlit run app.py --server.address=0.0.0.0"
environment = [
  "STREAMLIT_SERVER_PORT=$PORT",
]
healthCheckPath = "/"
